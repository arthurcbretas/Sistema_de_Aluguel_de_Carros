# ── Perfil de desenvolvimento (H2 in-memory) ────────────────────────
# Ative com: ./gradlew run -Dmicronaut.environments=dev
datasources:
  default:
    url: "jdbc:h2:mem:devDb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
    dialect: H2

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: create-drop     # recria o schema a cada restart em dev
        show_sql: true
        format_sql: true

logger:
  levels:
    br.com.pucminas: DEBUG
    io.micronaut.data: DEBUG
