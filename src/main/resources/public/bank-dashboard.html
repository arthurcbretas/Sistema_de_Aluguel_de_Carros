<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DriveLux | Painel Bancário</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="bank">

  <div class="dashboard-container">
    <header>
      <div>
        <h2 class="text-gradient" style="margin:0;">Painel Bancário</h2>
        <p style="margin:0; font-size: 0.875rem;">Gestão de Crédito — <span id="usernameDisplay">Banco</span></p>
      </div>
      <div class="d-flex">
        <button class="secondary" onclick="logout()">Sair</button>
      </div>
    </header>

    <div class="tabs" style="display: flex; gap: 1rem; margin-bottom: 1rem;">
      <button id="tabPendentesBtn" class="active" onclick="switchBankTab('pendentes')" style="flex:1;">Contratos Pendentes de Crédito</button>
      <button id="tabHistoricoBtn" class="secondary" onclick="switchBankTab('historico')" style="flex:1;">Créditos Associados</button>
    </div>

    <!-- SEÇÃO 1: CONTRATOS PENDENTES -->
    <div id="pendentesSection" class="glass-panel wide">
      <h3>Contratos Aguardando Crédito Bancário</h3>

      <div id="loadingPendentes" style="color:var(--text-muted); text-align:center; padding: 2rem;">
        Carregando contratos pendentes...
      </div>

      <div id="noPendentes" class="hidden" style="color:var(--text-muted); text-align:center; padding: 2rem;">
        Não há contratos pendentes de crédito no momento.
      </div>

      <div id="pendentesGrid" class="grid hidden">
        <!-- Renderizado via JS -->
      </div>
    </div>

    <!-- SEÇÃO 2: HISTÓRICO DE CRÉDITOS -->
    <div id="historicoSection" class="glass-panel wide hidden">
      <h3>Créditos Associados</h3>

      <div id="loadingHistorico" style="color:var(--text-muted); text-align:center; padding: 2rem;">
        Carregando créditos...
      </div>

      <div id="noHistorico" class="hidden" style="color:var(--text-muted); text-align:center; padding: 2rem;">
        Nenhum crédito associado ainda.
      </div>

      <div id="historicoGrid" class="grid hidden">
        <!-- Renderizado via JS -->
      </div>
    </div>
  </div>

  <!-- Modal Associar Crédito -->
  <div class="modal-overlay" id="creditoModal">
    <div class="modal-content">
      <h2 class="text-gradient">Associar Crédito Bancário</h2>
      
      <div id="creditoContratoInfo">
        <!-- Preenchido via JS -->
      </div>

      <form id="creditoForm">
        <div class="form-group">
          <label for="creditoValor">Valor do Crédito (R$)</label>
          <input type="number" id="creditoValor" required placeholder="Ex: 5000.00" min="1" step="0.01">
        </div>
        <div class="d-flex" style="gap: 1rem;">
          <div class="form-group" style="flex:1;">
            <label for="creditoParcelas">Nº de Parcelas</label>
            <input type="number" id="creditoParcelas" required placeholder="Ex: 12" min="1" max="120">
          </div>
          <div class="form-group" style="flex:1;">
            <label for="creditoTaxa">Taxa de Juros Mensal (%)</label>
            <input type="number" id="creditoTaxa" required placeholder="Ex: 1.99" min="0" step="0.01">
          </div>
        </div>

        <div id="creditoErrorMsg" class="hidden" style="color:var(--danger); margin-top:0.5rem;"></div>

        <div class="d-flex" style="margin-top: 1.5rem; justify-content: flex-end;">
          <button type="button" class="secondary" onclick="closeCreditoModal()" style="margin-right:0.5rem;">Cancelar</button>
          <button type="submit" style="background: #2ecc71; color: #1e1e1e;">Confirmar Crédito</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
