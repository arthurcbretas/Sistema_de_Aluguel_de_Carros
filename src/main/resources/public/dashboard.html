<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DriveLux | Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div class="dashboard-container">
    <header>
      <div>
        <h2 class="text-gradient" style="margin:0;">DriveLux Dashboard</h2>
        <p style="margin:0; font-size: 0.875rem;">Bem-vindo de volta, <span id="usernameDisplay">Usuário</span>.</p>
      </div>
      <div class="d-flex">
        <button onclick="openNovoPedidoModal()">Novo Pedido</button>
        <button class="secondary" onclick="logout()">Sair</button>
      </div>
    </header>

    <!-- Abas: Pedidos / Pesquisar Frota -->
    <div class="tabs" style="display: flex; gap: 1rem; margin-bottom: 1rem;">
      <button id="tabMeusPedidosBtn" class="active" onclick="switchClientTab('pedidos')" style="flex:1;">Meus Pedidos</button>
      <button id="tabFrotaCatalogoBtn" class="secondary" onclick="switchClientTab('frota')" style="flex:1;">Pesquisar Frota</button>
    </div>

    <!-- SEÇÃO 1: MEUS PEDIDOS -->
    <div id="meusPedidosSection" class="glass-panel wide">
      <h3>Meus Pedidos de Locação</h3>
      
      <!-- Placeholder para carregando -->
      <div id="loading" style="color:var(--text-muted); text-align:center; padding: 2rem;">
        Carregando pedidos...
      </div>
      
      <!-- Lista de pedidos vazia -->
      <div id="noPedidos" class="hidden" style="color:var(--text-muted); text-align:center; padding: 2rem;">
        Você ainda não possui pedidos de aluguel.
      </div>
      
      <!-- Grid de Pedidos -->
      <div id="pedidosGrid" class="grid hidden">
        <!-- Renderizado via JS -->
      </div>
    </div>

    <!-- SEÇÃO 2: CATÁLOGO DE FROTA -->
    <div id="frotaCatalogoSection" class="glass-panel wide hidden">
      <h3>Catálogo de Veículos Disponíveis</h3>
      
      <!-- Barra de pesquisa e filtros -->
      <div class="fleet-search-bar">
        <input type="text" id="searchFrota" placeholder="Buscar por marca, modelo..." oninput="filterFrotaCatalogo()">
        <select id="filterMarca" onchange="filterFrotaCatalogo()">
          <option value="">Todas as Marcas</option>
        </select>
        <select id="filterAno" onchange="filterFrotaCatalogo()">
          <option value="">Todos os Anos</option>
        </select>
      </div>

      <div id="loadingCatalogo" style="color:var(--text-muted); text-align:center; padding: 2rem;">
        Carregando veículos...
      </div>
      
      <div id="noCatalogo" class="hidden" style="color:var(--text-muted); text-align:center; padding: 2rem;">
        Nenhum veículo encontrado com os filtros selecionados.
      </div>

      <div id="catalogoGrid" class="grid hidden">
        <!-- Renderizado via JS -->
      </div>
    </div>
  </div>

  <!-- Modal Form Novo Pedido -->
  <div class="modal-overlay" id="novoPedidoModal">
    <div class="modal-content">
      <h2 class="text-gradient">Solicitar Aluguel</h2>
      <form id="novoPedidoForm">
        <div class="form-group">
          <label for="carroSelect">Selecionar Automóvel Disponível</label>
          <select id="carroSelect" required>
            <option value="">Carregando veículos...</option>
          </select>
        </div>
        <div class="d-flex">
          <div class="form-group" style="flex:1;">
            <label for="dataInicio">Início da Locação</label>
            <input type="date" id="dataInicio" required>
          </div>
          <div class="form-group" style="flex:1;">
            <label for="dataFim">Fim da Locação</label>
            <input type="date" id="dataFim" required>
          </div>
        </div>
        
        <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem;">
          <input type="checkbox" id="necessitaCredito" style="width: auto;">
          <label for="necessitaCredito" style="margin: 0; cursor: pointer;">
            Necessito de financiamento bancário
          </label>
        </div>

        <div id="pedidoErrorMsg" class="hidden" style="color:var(--danger); margin-bottom: 1rem; font-size: 0.875rem;"></div>

        <div class="d-flex" style="margin-top: 1.5rem;">
          <button type="button" class="secondary" onclick="closeNovoPedidoModal()">Cancelar</button>
          <button type="submit">Enviar Pedido</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Detalhes do Pedido -->
  <div class="modal-overlay" id="detalhesPedidoModal">
    <div class="modal-content">
      <h2 class="text-gradient">Detalhes do Pedido</h2>
      <div id="detalhesContent">
        <!-- Preenchido via JS -->
      </div>
      <div class="d-flex" style="margin-top: 1.5rem; justify-content: flex-end;">
        <button type="button" class="danger" id="btnCancelarPedido">Cancelar Pedido</button>
        <button type="button" class="secondary" onclick="closeDetalhesModal()">Fechar</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
